name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libperlio-gzip-perl libjson-pp-perl
        wget https://github.com/linux-test-project/lcov/releases/download/v2.1/lcov-2.1.tar.gz
        tar -xzf lcov-2.1.tar.gz
        cd lcov-2.1
        sudo make install

    - name: Install Nim
      run: |
        export CHOOSENIM_CHOOSE_VERSION="2.2.10"
        curl https://nim-lang.org/choosenim/init.sh -sSf > init.sh
        sh init.sh -y

    - name: Run Tests and Generate Coverage
      run: |
        export PATH=$HOME/.nimble/bin:$PATH
        nimble coverage

    - name: Capture Coverage Report
      run: |
        lcov --ignore-errors inconsistent,unused --capture --directory nimcache --output-file coverage.info
        lcov --ignore-errors inconsistent,unused --remove coverage.info '*/lib/*' --output-file coverage.info

    - name: Generate Coverage Badge
      run: |
        coverage_pct=$(awk -F: '/^LF:/ {lf+=$2} /^LH:/ {lh+=$2} END {if (lf>0) printf "%.1f", (lh/lf)*100; else print "0"}' coverage.info)
        color=$(awk -v pct="$coverage_pct" 'BEGIN {
          if (pct >= 90) print "brightgreen";
          else if (pct >= 75) print "green";
          else if (pct >= 50) print "yellow";
          else print "red";
        }')
        echo "Coverage is $coverage_pct%, color is $color"
        mkdir -p docs
        curl -s -o docs/coverage.svg "https://img.shields.io/badge/Coverage-${coverage_pct}%25-${color}"

    - name: Commit Badge
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add docs/coverage.svg
        git diff-index --quiet HEAD || git commit -m "Update coverage badge [skip ci]" -a
        git push
