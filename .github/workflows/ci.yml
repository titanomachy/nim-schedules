name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get remove -y lcov || true
        sudo apt-get install -y libperlio-gzip-perl libjson-pp-perl libcapture-tiny-perl libdatetime-perl
        wget https://github.com/linux-test-project/lcov/releases/download/v2.1/lcov-2.1.tar.gz
        tar -xzf lcov-2.1.tar.gz
        cd lcov-2.1
        sudo make install

    - name: Install Nim
      run: |
        export CHOOSENIM_CHOOSE_VERSION="2.2.10"
        curl https://nim-lang.org/choosenim/init.sh -sSf > init.sh
        sh init.sh -y

    - name: Generate HTML Documentation
      run: |
        export PATH=$HOME/.nimble/bin:$PATH
        nimble docs

    - name: Run Tests and Generate Coverage
      run: |
        export PATH=$HOME/.nimble/bin:$PATH
        nimble coverage

    - name: Enforce Minimum Coverage
      run: |
        awk -F: -v minimum=80 '
          /^LH:/ { covered += $2 }
          /^LF:/ { total += $2 }
          END {
            if (total == 0) {
              print "No coverage data found"
              exit 2
            }

            percent = covered * 100 / total
            printf "Line coverage: %.1f%%\n", percent

            if (percent < minimum) {
              printf "Coverage is below %.1f%%\n", minimum
              exit 1
            }
          }
        ' coverage.info

    - name: Configure GitHub Pages
      if: github.event_name == 'push' && github.ref == 'refs/heads/master'
      uses: actions/configure-pages@v5

    - name: Upload GitHub Pages Artifact
      if: github.event_name == 'push' && github.ref == 'refs/heads/master'
      uses: actions/upload-pages-artifact@v4
      with:
        path: docs

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - name: Deploy GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
